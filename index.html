<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- Bootstrap Styles -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- custom styles -->
    <link rel="stylesheet" href="./css/styles.css">

  </head>
  <body>
    <div class="container my-5">
      <!-- first row -->
      <div id="productList" class="row row-cols-1 row-cols-md-3 g-4 mx-auto">
        <!-- ! dynamically insert product list here -->
      </div>
    </div>

    <!-- ! productModal -->
    <div
      class="modal fade"
      id="productModal"
      tabindex="-1"
      aria-labelledby="productModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <!-- ! productModalTitle -->
            <h1 id="productModalTitle" class="modal-title fs-5" id="exampleModalLabel">

            </h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div id="productModalBody" class="modal-body">
            
            <!-- ! Start Card area to display the selected Product -->
            <div class="card h-100 product-card rounded-0 border-0">
                <!-- ! productModalImage -->
                <img id="productModalImage" class="card-img-top rounded-0" alt="...">
                <div class="d-flex card-body flex-column">
                    <p id="productModalDesc" class="card-text d-block">
                        <!-- ! productModaDesc -->
                    </p>
                </div>
            </div>
            <!-- ! End Card area to display the selected Product -->

        </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
            <button type="button" class="btn btn-danger">Add to Cart</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ! scripts to manage product listings -->
    <script src="./script/components/Spinner.js"></script>
    <script src="./script/data.js"></script>
    <script src="./script/productcard2.js"></script>

    <!-- Bootstrap Javascript Library -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
